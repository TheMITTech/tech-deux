services:
  web:
    build:
      context: ../
      dockerfile: ./docker/web/Dockerfile
    restart: unless-stopped
    networks:
      - traefik_bridge
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_bridge"
      - "traefik.http.routers.tech-deux.rule=Host(`next.thetech.com`)"
      - "traefik.http.routers.tech-deux.entrypoints=websecure"
      - "traefik.http.routers.tech-deux.tls.certresolver=leresolver"
      - "traefik.http.services.tech-deux.loadbalancer.server.port=4321"

networks:
  traefik_bridge:
    external: true
  bridge:
    external: false